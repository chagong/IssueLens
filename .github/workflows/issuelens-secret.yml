# IssueLens (client-secret auth) — triage & label GitHub issues via the hosted
# IssueLens agent, WITHOUT GitHub OIDC.
#
# Use this variant for repositories that CANNOT use Azure OIDC federation — e.g.
# a personal / testing repo that is not part of a Microsoft-managed GitHub
# enterprise, so its OIDC token lacks the required `enterprise` claim and Entra
# rejects the federation (AADSTS7002381). For Microsoft-org repos, prefer the
# OIDC variant: issuelens.yml.
#
# It authenticates as the IssueLens GitHub App (App installation token), signs in
# to Azure with a service-principal **client secret**, then calls the hosted
# agent, which does the AI work and acts on GitHub as the App bot.
#
# One-time setup in the repository (Settings → Secrets and variables → Actions):
#   Variables:
#     ISSUELENS_APP_ID          GitHub App numeric App ID
#   Secrets:
#     ISSUELENS_APP_PRIVATE_KEY GitHub App private key (full PEM contents)
#     AZURE_CLIENT_ID           App registration (service principal) client ID
#     AZURE_CLIENT_SECRET       A client secret for that app registration
#     AZURE_TENANT_ID           Entra tenant ID
#     ISSUELENS_AGENT_URL       Full deployed invocations endpoint
#                               (…/protocols/invocations?api-version=…)
#     ISSUELENS_AGENT_SCOPE     Entra scope/resource for the agent endpoint token
#
# The service principal (AZURE_CLIENT_ID) must be authorized to invoke the agent
# (an appropriate role on the Foundry project). Note: the agent's own managed
# identity separately needs model access to run inference.

name: IssueLens (client-secret)

on:
  # Event-driven: label newly opened / reopened issues.
  issues:
    types: [opened, reopened]
  # Manual run (triage).
  workflow_dispatch:

# No id-token permission — auth uses a client secret, not OIDC.
permissions:
  contents: read

concurrency:
  group: issuelens-secret-${{ github.ref }}
  cancel-in-progress: false

jobs:
  issuelens:
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.ISSUELENS_APP_ID }}
          private-key: ${{ secrets.ISSUELENS_APP_PRIVATE_KEY }}

      - name: Invoke IssueLens agent
        env:
          EVENT: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          # Masked automatically by create-github-app-token; kept in-step only.
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          AGENT_URL: ${{ secrets.ISSUELENS_AGENT_URL }}
          AGENT_SCOPE: ${{ secrets.ISSUELENS_AGENT_SCOPE }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          set -euo pipefail

          # Build the invocation payload based on the trigger. The agent takes a
          # 2-field payload: "input" (a free-form task prompt) and "github_token"
          # (used to authenticate the GitHub MCP server as the App bot).
          if [ "$EVENT" = "issues" ]; then
            input="Label GitHub issue ${REPO}#${ISSUE} using the repository's labeling instructions. Read the issue with the available GitHub tools and apply appropriate labels."
          else
            since=$(date -u -d '24 hours ago' +'%Y-%m-%dT%H:00:00Z')
            input="Triage the open GitHub issues in ${REPO} updated since ${since}. Identify critical (hot/blocking/regression) issues, apply labels, produce the final JSON summary, and send the report."
          fi
          payload=$(jq -cn \
            --arg input "$input" \
            --arg tok "$GH_APP_TOKEN" \
            '{input:$input, github_token:$tok}')

          # Sign in to Azure with a service-principal client secret (no OIDC).
          # The secret is a masked GitHub Actions secret.
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" --output none

          # Bearer token for the hosted agent endpoint (Entra).
          agent_token=$(az account get-access-token --scope "$AGENT_SCOPE" --query accessToken -o tsv)

          # Call the agent. ISSUELENS_AGENT_URL is the full deployed invocations
          # endpoint (…/protocols/invocations?api-version=…). SSE is streamed back;
          # -N disables curl buffering.
          curl -sS -N -X POST "$AGENT_URL" \
            -H "Authorization: Bearer $agent_token" \
            -H "Content-Type: application/json" \
            -d "$payload"
