name: Triage - Personal SLA Notifications (Working Days)

# ---------------------------------------------------------------------------
# Standalone per-assignee SLA notification workflow.
#
# A single job so every step shares the same workspace and `triage-results.json`
# is passed from step to step without any artifact upload/download.
#
# SLA rules live in the TARGET repo's `.github/sla.md` (markdown), so they can
# diverge from any hard-coded default. Rather than asking the AI to judge every
# issue (which does not scale past the matrix cap and costs one Copilot run per
# issue), we use the `check-sla` skill's generate → verify → run flow:
#
#   1. prepare — read the assignee roster from the IDS secret, query each
#      assignee's OPEN issues, and write them to `triage-results.json`.
#   2. sla     — ONE Copilot run uses the check-sla skill to generate a
#      deterministic `sla_check.py` AND verify it itself against the skill's
#      fixture, iterating until it passes. CI then RE-RUNS the same verifier as
#      an independent gate (so we never trust an unverified script), and finally
#      runs the verified script over every issue in one pass, writing SLA
#      verdicts back into the JSON.
#   3. notify  — send each assignee a personal Teams notification listing their
#      VIOLATIONS. No merge step is needed: the script scores the roster in place.
#
# A failing step stops the run, so notifications never fire on an un-evaluated
# roster. Only the Copilot logs/session are uploaded, for debugging.
# ---------------------------------------------------------------------------

on:
  schedule:
    - cron: '0 0 * * 1-5'  # Every weekday at 08:00 Shanghai Time (UTC+8)
  workflow_dispatch:

env:
  TARGET_REPO: microsoft/copilot-intellij-feedback
  SCRIPTS_DIR: .github/scripts/triage

jobs:
  sla-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      # --- Stage 1: fetch each assignee's open issues (deterministic, no AI) ---
      - name: Fetch issues assigned to IDS members
        run: |
          python "$SCRIPTS_DIR/fetch_issues.py" \
            --repo "$TARGET_REPO" \
            --mode assignees \
            --output triage-results.json
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          IDS: ${{ secrets.IDS }}

      - name: Count issues
        id: list
        run: |
          count=$(python -c "import json;print(len(json.load(open('triage-results.json'))))")
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count issue(s) to evaluate."

      # --- Stage 2: generate -> verify -> run the SLA script (check-sla skill) ---
      # The skill makes Copilot generate the script AND run the deterministic
      # verifier itself, iterating until it passes. All the detail lives in the
      # skill, so this prompt is a single sentence.
      - name: Generate and self-verify the SLA script (check-sla skill)
        if: ${{ steps.list.outputs.count > 0 }}
        run: |
          mkdir -p sla-gen
          prompt="Use the 'check-sla' skill to produce a verified SLA evaluation script for the repository $TARGET_REPO, written to ./sla-gen/sla_check.py. Follow the skill's steps exactly, including running its verifier yourself and iterating until it exits 0. Do not evaluate the real issues and do not modify any other file."

          copilot --allow-all --enable-all-github-mcp-tools --no-custom-instructions --no-ask-user \
            --log-level debug --log-dir ./copilot-logs \
            --share=./copilot-session.md \
            --prompt "$prompt"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.PAT }}
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Run SLA evaluation over all issues
        if: ${{ steps.list.outputs.count > 0 }}
        run: |
          python sla-gen/sla_check.py \
            --input triage-results.json \
            --output triage-results.json
          python -c "import json;d=json.load(open('triage-results.json'));print('Evaluated',len(d),'issue(s)')"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      # --- Stage 3: send personal notifications (no AI) ---
      - name: Send personal SLA notifications
        if: ${{ steps.list.outputs.count > 0 }}
        run: |
          workflow_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python "$SCRIPTS_DIR/notify.py" \
            --input triage-results.json \
            --mode personal \
            --workflow-url "$workflow_url" \
            --title "SLA Violations Needing Attention - JetBrains Copilot"
        env:
          IDS: ${{ secrets.IDS }}
          PERSONAL_NOTIFICATION_URL: ${{ secrets.PERSONAL_NOTIFICATION_URL }}

      # Upload only the Copilot logs/session for debugging — not the roster JSON.
      - name: Upload Copilot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sla-copilot-logs
          path: |
            copilot-logs/
            copilot-session.md
            triage-results.json
          retention-days: 7
          if-no-files-found: ignore
