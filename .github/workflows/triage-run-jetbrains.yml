name: Triage Issues For JetBrains Copilot

on:
  schedule:
    - cron: '0 0 * * 1-5'  # Runs every weekday at 08:00 Shanghai Time (UTC+8)
  workflow_dispatch:
    inputs:
      user_query:
        description: 'Custom user query (leave empty for default triage query)'
        type: string
        required: false
        default: ''
      since_date:
        description: 'Triage issues opened since this date (YYYY-MM-DD)'
        type: string
        required: false
        default: '2026-01-01'

jobs:
  triage-jetbrains-copilot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot
      
      - name: Triage with Copilot CLI
        id: triage
        run: |
          # Define default user query
          since_date="${{ inputs.since_date || '2026-01-01' }}"
          default_query="Triage open issues that were opened since ${since_date}"
          
          # Use custom query if provided, otherwise use default
          if [ -n "${{ inputs.user_query }}" ]; then
            user_query="${{ inputs.user_query }}"
          else
            user_query="$default_query"
          fi

          # Define target repositories
          repos="- microsoft/copilot-intellij-feedback"

          # Define instructions and notes
          read -r -d '' instructions << 'INSTRUCTIONS' || true
          ## Important: Context Management Strategy
          There may be a large number of issues to triage. To avoid losing context:

          ### Phase 1: Fetch and Triage Issues
          #### Step 1 — List issues
          Fetch all matching open issues and save them to `triage-results.json`:
          ```bash
          gh issue list --repo <owner>/<repo> --state open --limit 500 \
            --json number,title,url,assignees,labels,createdAt \
            --search "created:>=${since_date}" > /tmp/raw_issues.json
          ```
          Then normalize into `triage-results.json` using Python (extract assignee logins, label names):
          ```python
          python3 -c "
          import json, pathlib
          raw = json.loads(pathlib.Path('/tmp/raw_issues.json').read_text())
          out = [{
              'repo': '<owner>/<repo>',
              'issue_number': i['number'],
              'title': i['title'],
              'url': i['url'],
              'assignees': [a['login'] for a in i.get('assignees', [])],
              'labels': [l['name'] for l in i.get('labels', [])],
              'createdAt': i['createdAt']
          } for i in raw]
          pathlib.Path('triage-results.json').write_text(json.dumps(out, indent=2))
          print(f'Saved {len(out)} issues to triage-results.json')
          "
          ```

          #### Step 2 — Label and check SLA for each issue
          For each issue in `triage-results.json`:
          1. **Label**: Apply the 'label-issue' skill to determine and add labels.
          2. **Check SLA**: Apply the 'check-sla' skill to evaluate SLA compliance.
          3. **Update `triage-results.json`**: Add these properties to each issue entry:
             - `labels_added` — array of new labels applied by the label-issue skill
             - `sla_status` — one of `"GOOD"`, `"WARNING"`, `"VIOLATION"`
             - `sla_details` — brief reason for the SLA status
             - `days_open` — number of days since issue was created

          The final `triage-results.json` should contain entries matching this schema:
          ```json
          [
            {
              "repo": "owner/repo",
              "issue_number": 123,
              "title": "Issue title",
              "url": "https://github.com/owner/repo/issues/123",
              "assignees": ["user1", "user2"],
              "labels": ["bug", "area:chat"],
              "createdAt": "2026-01-15T10:00:00Z",
              "labels_added": ["bug"],
              "sla_status": "GOOD | WARNING | VIOLATION",
              "sla_details": "Brief reason",
              "days_open": 5
            }
          ]
          ```

          ### Phase 2: Group and Summarize (read from file)
          After ALL issues are processed:
          1. Read `triage-results.json` to get the full picture.
          2. Group SLA violations by assignee.
          3. Send personal notifications to assignees for SLA violations using the 'send-personal-notification' skill.
             - Retrieve assignee email addresses from the 'IDS' environment variable.
             - Group issues by assignee and send one notification per assignee.
             - If an issue has multiple assignees, notify each of them.
             - Skip notification if the assignee's email is not found.
          4. Send a summary email of the triage operation using the 'send-email' skill.
             - Send to email addresses specified in the 'REPORT_RECIPIENTS' environment variable.
             - Include counts: total issues triaged, SLA good, SLA warning, SLA violation.
             - Include views: counts summary, top assigness with SLA violations, and top 20 oldest issues with SLA violations.
             - Include a link to the workflow run for details.

          ### Skill Usage
          - Label issues using the 'label-issue' skill.
          - Check SLA compliance using the 'check-sla' skill.

          ## CRITICAL: Shell Command Safety Rules
          The Copilot CLI shell tool WILL BLOCK commands that look like dangerous shell expansion.
          Blocked commands cause the entire operation to fail. You MUST follow these rules for ALL shell commands:

          1. **NEVER use `$(...)` command substitution** inside echo or other commands.
             - BAD:  `echo "Total: $(jq length file.json)"`
             - GOOD: `jq length file.json`
          2. **NEVER use jq string interpolation `\(...)` inside shell strings**.
             - BAD:  `jq '.[] | .url = "https://example.com/\(.number)"'`
             - GOOD: `jq '.[] | .url = ("https://example.com/" + (.number | tostring))'`
          3. **NEVER use heredocs (`<< EOF`, `<< 'EOF'`, `<< JSONEOF`, etc.) to write ANY data**.
             - BAD:  `cat > file.json << 'EOF' ... EOF`
             - GOOD: Use Python to write files: `python3 -c "import json; json.dump(data, open('file.json','w'))"`
             - GOOD: Use the file creation tool if available.
          4. **Prefer Python scripts over complex jq pipelines** for data transformation.
             Write a short inline Python script and execute it with `python3 script.py` instead of chaining jq commands.
          5. **Keep shell commands simple** — one operation per command when possible.

          ## Notes
          - Use 'gh' CLI if you encounter issues with MCP tools.
          - Minimize exploratory commands. Do not inspect JSON structure repeatedly — assume standard GitHub API shapes.
          - Avoid fetching more data than needed. Use date filters in queries to reduce issue count.
          INSTRUCTIONS

          # Define workflow URL
          workflow_url="Workflow Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Compose the full prompt
          prompt="$user_query

          ## Target Repositories
          $repos

          $instructions

          $workflow_url"

          echo "Triage with prompt: $prompt"
          output=$(copilot --allow-all --enable-all-github-mcp-tools --no-custom-instructions --no-ask-user --prompt "$prompt" 2>&1 || true)
          
          echo "Raw output:"
          echo "$output"
          
          # Save output to file for artifact
          echo "$output" > triage-output.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.PAT }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          IDS: ${{ secrets.IDS }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
          MAILING_URL: ${{ secrets.MAILING_URL }}
          PERSONAL_NOTIFICATION_URL: ${{ secrets.PERSONAL_NOTIFICATION_URL }}

      - name: Upload triage output
        uses: actions/upload-artifact@v4
        with:
          name: triage-output
          path: |
            triage-output.txt
            triage-results.json
          retention-days: 30
