name: Triage - Weekly Summary Report (Mondays)

# ---------------------------------------------------------------------------
# Standalone weekly summary report.
#
#   1. Fetch all OPEN issues created since --since.
#   2. Evaluate the SLA for each issue using the `check-sla` skill: ONE Copilot
#      run generates a deterministic `sla_check.py` from the target repo's SLA
#      policy and self-verifies it; CI re-verifies it as an independent gate,
#      then runs it over every issue in one pass (no hard-coded SLA rules).
#   3. Render a data-facing HTML report with embedded matplotlib charts
#      (SLA distribution, age histogram, issues + violations by assignee and
#      label, status-by-assignee, etc.).
#   4. Email the chart-rich report to REPORT_RECIPIENTS.
#
# Only the SLA evaluation uses AI (one Copilot run); fetch, charts and email are
# pure Python.
# ---------------------------------------------------------------------------

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at 08:00 Shanghai Time (UTC+8)
  workflow_dispatch:
    inputs:
      since_date:
        description: 'Include open issues created since this date (YYYY-MM-DD)'
        type: string
        required: false
        default: '2026-01-01'

env:
  TARGET_REPO: microsoft/copilot-intellij-feedback
  SCRIPTS_DIR: .github/scripts/triage
  SKILL_DIR: .github/skills/check-sla

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Install charting dependencies
        run: pip install matplotlib

      - name: Fetch open issues
        run: |
          since_date="${{ inputs.since_date || '2026-01-01' }}"
          python "$SCRIPTS_DIR/fetch_issues.py" \
            --repo "$TARGET_REPO" \
            --mode created \
            --since "$since_date" \
            --output triage-results.json
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      # --- Evaluate SLA via the check-sla skill (generate -> verify -> run) ---
      # The skill makes Copilot generate the SLA script AND run the deterministic
      # verifier itself, iterating until it passes. The detail lives in the
      # skill, so this prompt is a single sentence.
      - name: Generate and self-verify the SLA script (check-sla skill)
        run: |
          mkdir -p sla-gen
          prompt="Use the 'check-sla' skill to produce a verified SLA evaluation script for the repository $TARGET_REPO, written to ./sla-gen/sla_check.py. Follow the skill's steps exactly, including running its verifier yourself and iterating until it exits 0. Do not evaluate the real issues and do not modify any other file."

          copilot --allow-all --enable-all-github-mcp-tools --no-custom-instructions --no-ask-user \
            --log-level debug --log-dir ./copilot-logs \
            --share=./copilot-session.md \
            --prompt "$prompt"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.PAT }}
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Run SLA evaluation over all issues
        run: |
          python sla-gen/sla_check.py \
            --input triage-results.json \
            --output triage-results.json
          python -c "import json;d=json.load(open('triage-results.json'));print('Evaluated',len(d),'issue(s)')"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Render chart report
        run: |
          python "$SCRIPTS_DIR/render_issue_charts.py" \
            --input triage-results.json \
            --output report-content.html \
            --title "Weekly Issue Triage Report - JetBrains Copilot"

      - name: Send summary email with charts
        run: |
          workflow_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python "$SCRIPTS_DIR/notify.py" \
            --input triage-results.json \
            --mode email \
            --content-file report-content.html \
            --workflow-url "$workflow_url" \
            --title "Weekly Issue Triage Report - JetBrains Copilot"
        env:
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
          MAILING_URL: ${{ secrets.MAILING_URL }}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report
          path: |
            report-content.html
            triage-results.json
            sla-gen/sla_check.py
            copilot-logs/
            copilot-session.md
          retention-days: 30
